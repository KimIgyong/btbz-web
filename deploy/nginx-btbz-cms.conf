# btbz CMS nginx 스니펫 — 2026-07-20 서버 적용됨 (백업: /root/nginx-backup-*)
# 적용 위치: /etc/nginx/sites-enabled/{btbz.ai, modora.btbz.ai} 각 443 server 블록,
#            "location / {" 바로 앞. 백엔드 포트 3110 (3100은 ambCampaign 사용 중).
#
# 웹루트 (Q-3 확인 결과):
#   www.btbz.ai    → /var/www/btbz.ai/html         (admin/ 폴더 복사만으로 /admin 서빙됨)
#   modora.btbz.ai → /var/www/modora.btbz.ai/html

    location /api/ {
        proxy_pass http://127.0.0.1:3110;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
