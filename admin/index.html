<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex, nofollow">
<title>BTBZ Admin</title>
<style>
  :root {
    --bg: #ffffff; --fg: #1a1d21; --muted: #5c6470; --accent: #2563eb;
    --border: #e5e8ec; --card: #f6f8fa; --danger: #dc2626; --ok: #16a34a;
  }
  @media (prefers-color-scheme: dark) {
    :root { --bg: #14161a; --fg: #e6e9ed; --muted: #9aa3af; --accent: #60a5fa;
            --border: #2a2f36; --card: #1d2127; --danger: #f87171; --ok: #4ade80; }
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--fg); line-height: 1.6; font-size: 14.5px;
         font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Apple SD Gothic Neo",
                      "Noto Sans KR", Roboto, sans-serif; }
  a { color: var(--accent); text-decoration: none; }
  button { font: inherit; cursor: pointer; border-radius: 8px; border: 1px solid var(--border);
           background: var(--card); color: var(--fg); padding: .4rem .9rem; }
  button.primary { background: var(--accent); border-color: var(--accent); color: #fff; font-weight: 600; }
  button.danger { color: var(--danger); border-color: var(--danger); background: transparent; }
  button.small { font-size: .8rem; padding: .25rem .6rem; }
  button[disabled] { opacity: .5; cursor: default; }
  input, select { font: inherit; border: 1px solid var(--border); background: var(--bg);
                  color: var(--fg); border-radius: 8px; padding: .45rem .7rem; }

  /* 로그인 */
  .login-wrap { max-width: 360px; margin: 14vh auto 0; padding: 0 1.2rem; }
  .login-card { background: var(--card); border: 1px solid var(--border); border-radius: 14px;
                padding: 1.6rem; }
  .login-card h1 { font-size: 1.2rem; margin-bottom: 1rem; }
  .login-card label { display: block; font-size: .85rem; color: var(--muted); margin: .7rem 0 .25rem; }
  .login-card input { width: 100%; }
  .login-card button { width: 100%; margin-top: 1.1rem; padding: .55rem; }
  .login-card .msg { margin-top: .7rem; font-size: .85rem; }

  /* 레이아웃 */
  .layout { display: none; min-height: 100vh; }
  .layout.on { display: flex; }
  nav { width: 200px; border-right: 1px solid var(--border); padding: 1.2rem .8rem; flex-shrink: 0; }
  nav .brand { font-weight: 800; font-size: 1.05rem; margin: 0 .4rem 1.2rem; }
  nav .brand span { color: var(--accent); }
  nav a.item { display: block; padding: .5rem .6rem; border-radius: 8px; color: var(--fg);
               font-size: .92rem; margin-bottom: .15rem; }
  nav a.item.active { background: var(--accent); color: #fff; }
  nav .foot { margin-top: 1.5rem; padding-top: 1rem; border-top: 1px solid var(--border);
              font-size: .8rem; color: var(--muted); }
  nav .foot .who { word-break: break-all; margin-bottom: .5rem; }
  main { flex: 1; padding: 1.6rem 2rem; min-width: 0; }
  main h2 { font-size: 1.25rem; margin-bottom: 1.1rem; }

  /* 컴포넌트 */
  .cards { display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
           gap: .7rem; margin-bottom: 1.4rem; }
  .stat { background: var(--card); border: 1px solid var(--border); border-radius: 12px;
          padding: .9rem 1rem; }
  .stat .n { font-size: 1.5rem; font-weight: 800; }
  .stat .l { font-size: .8rem; color: var(--muted); }
  .tbl-wrap { overflow-x: auto; border: 1px solid var(--border); border-radius: 12px;
              margin-bottom: 1rem; }
  table { border-collapse: collapse; width: 100%; font-size: .87rem; }
  th, td { text-align: left; padding: .55rem .8rem; border-bottom: 1px solid var(--border);
           white-space: nowrap; }
  td.wrap { white-space: normal; word-break: break-word; min-width: 200px; }
  th { background: var(--card); font-size: .8rem; color: var(--muted); }
  tr:last-child td { border-bottom: none; }
  .row-actions { display: flex; gap: .3rem; flex-wrap: wrap; }
  .toolbar { display: flex; gap: .5rem; align-items: center; margin-bottom: .9rem; flex-wrap: wrap; }
  .toolbar .spacer { flex: 1; }
  .pager { display: flex; gap: .5rem; align-items: center; justify-content: center; }
  .badge { display: inline-block; font-size: .75rem; padding: .1rem .5rem; border-radius: 999px;
           border: 1px solid var(--border); color: var(--muted); }
  .badge.new, .badge.pending { border-color: var(--accent); color: var(--accent); }
  .badge.ok, .badge.visible, .badge.handled { border-color: var(--ok); color: var(--ok); }
  .badge.hidden { border-color: var(--danger); color: var(--danger); }
  .msg.ok { color: var(--ok); } .msg.err { color: var(--danger); }
  .empty { color: var(--muted); padding: 2rem; text-align: center; }
  .subtitle { font-size: .85rem; color: var(--muted); margin: -0.8rem 0 1rem; }
  h3.sec { font-size: 1rem; margin: 1.4rem 0 .6rem; }
  dialog { border: 1px solid var(--border); border-radius: 14px; background: var(--bg);
           color: var(--fg); padding: 1.4rem; max-width: 420px; width: 90%; }
  dialog::backdrop { background: rgba(0,0,0,.5); }
  dialog h3 { margin-bottom: .8rem; font-size: 1.05rem; }
  dialog label { display: block; font-size: .85rem; color: var(--muted); margin: .6rem 0 .2rem; }
  dialog input { width: 100%; }
  dialog .actions { display: flex; gap: .5rem; justify-content: flex-end; margin-top: 1.1rem; }
  .temp-pw { background: var(--card); border: 1px dashed var(--accent); border-radius: 8px;
             padding: .6rem .8rem; font-family: ui-monospace, monospace; font-size: 1rem;
             margin: .6rem 0; user-select: all; }
  @media (max-width: 720px) {
    .layout.on { flex-direction: column; }
    nav { width: auto; border-right: none; border-bottom: 1px solid var(--border);
          display: flex; flex-wrap: wrap; gap: .2rem; align-items: center; }
    nav .brand { margin: 0 .6rem 0 0; }
    nav .foot { margin: 0 0 0 auto; border: none; padding: 0; }
    main { padding: 1.2rem; }
  }
</style>
</head>
<body>

<!-- 로그인 화면 -->
<div class="login-wrap" id="view-login">
  <div class="login-card">
    <h1>BTBZ <span style="color:var(--accent)">Admin</span></h1>
    <form id="login-form">
      <label for="lg-email">이메일</label>
      <input id="lg-email" type="email" autocomplete="username" required>
      <label for="lg-pw">비밀번호</label>
      <input id="lg-pw" type="password" autocomplete="current-password" required>
      <button class="primary" type="submit">로그인</button>
      <div class="msg" id="lg-msg"></div>
    </form>
  </div>
</div>

<!-- 비밀번호 변경 화면 (임시/초기 비밀번호 로그인 시 강제) -->
<div class="login-wrap" id="view-changepw" style="display:none">
  <div class="login-card">
    <h1>비밀번호 변경</h1>
    <p style="font-size:.85rem;color:var(--muted);margin-bottom:.4rem">
      임시(초기) 비밀번호로 로그인했습니다. 계속하려면 새 비밀번호를 설정하세요.
    </p>
    <form id="changepw-form">
      <label for="cp-cur">현재 비밀번호</label>
      <input id="cp-cur" type="password" autocomplete="current-password" required>
      <label for="cp-new">새 비밀번호 (8자 이상)</label>
      <input id="cp-new" type="password" autocomplete="new-password" minlength="8" required>
      <button class="primary" type="submit">변경하기</button>
      <div class="msg" id="cp-msg"></div>
    </form>
  </div>
</div>

<!-- 메인 레이아웃 -->
<div class="layout" id="view-main">
  <nav>
    <div class="brand">BTBZ<span>.</span>Admin</div>
    <a class="item" href="#stats">📊 다운로드 통계</a>
    <a class="item" href="#subscribers">📬 이메일 구독자</a>
    <a class="item" href="#inquiries">💬 개발자 문의사항</a>
    <a class="item" href="#reviews">⭐ 사용후기 게시판</a>
    <a class="item" href="#users">👤 관리자 관리</a>
    <div class="foot">
      <div class="who" id="who"></div>
      <button class="small" onclick="logout()">로그아웃</button>
    </div>
  </nav>
  <main id="main"></main>
</div>

<script src="admin.js"></script>
</body>
</html>
